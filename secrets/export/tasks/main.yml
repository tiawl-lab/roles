---

# TODO: send an email and/or alert the supervision when used
# TODO: add the {{ secrets_user }} variable into the email/supervision

- block:
  - ansible.builtin.set_fact:
      b64encoded_gpg_public_key: ""
      b64encoded_gpg_private_key: ""

  - name: Register GnuPG key organization secrets
    block:
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
      vars:
        secret_name: 'GPG_PUBLIC_KEY'
        request_bearer: "{{ secrets_token }}"
    - ansible.builtin.set_fact:
        b64encoded_gpg_public_key: "{{ githoster_get_secret }}"
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
      vars:
        secret_name: 'GPG_PRIVATE_KEY'
        request_bearer: "{{ secrets_token }}"
    - ansible.builtin.set_fact:
        b64encoded_gpg_private_key: "{{ githoster_get_secret }}"

  - name: Write GnuPG keys into files
    block:
    - ansible.builtin.copy:
        content: "{{ b64encoded_gpg_public_key | b64decode }}"
        dest: "{{ secrets_cwd + '/' + repo_main_passwordstore_submodule_path + '/gpg-public-key.asc' }}"
    - ansible.builtin.copy:
        content: "{{ b64encoded_gpg_private_key | b64decode }}"
        dest: "{{ secrets_cwd + '/' + repo_main_passwordstore_submodule_path + '/gpg-private-key.asc' }}"

  - block:
    - name: Stage the exported keys into the password-store
      ansible.builtin.command: "{{ passwordstore_git_cmd + ' add -A' }}"
    - name: Commit the exported keys into the password-store
      ansible.builtin.command: "{{ passwordstore_git_cmd + ' commit -m \"Export the GnuPG keys\"' }}"
    - name: Push the password-store
      ansible.builtin.command: "{{ passwordstore_git_cmd + ' push' }}"
    environment:
      PASSWORD_STORE_DIR: "{{ secrets_cwd + '/' + repo_main_passwordstore_submodule_path }}"

  # TODO: handle the case where 1 of the 3 next tasks fail => submodule and password-store must be synchronized
  - module_defaults:
      ansible.builtin.command:
        chdir: "{{ secrets_cwd }}"
    block:
    - name: Stage the updated password-store submodule of the main repository
      ansible.builtin.command: git add -A
    - name: Commit the updated password-store submodule of the main repository
      ansible.builtin.command: git commit -m 'Update the password-store submodule'
    - name: Push the main repository with the updated password-store submodule
      ansible.builtin.command: git push

  rescue:
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/pre/cleanup.yml"
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/secrets/cleanup.yml"
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/post/cleanup.yml"
    - ansible.builtin.fail:
        msg: "A previous rescued task failed"
